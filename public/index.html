<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive Data Dashboard - Real-time analytics and visualizations">
  <meta name="theme-color" content="#3b82f6">
  <title>Interactive Data Dashboard</title>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <noscript>
    <div class="noscript-message">
      <h2>JavaScript Required</h2>
      <p>This interactive dashboard requires JavaScript to function. Please enable JavaScript in your browser settings.</p>
    </div>
  </noscript>

  <!-- Application modules -->
  <script src="../src/utils/formatters.js"></script>
  <script src="../src/utils/dataGenerator.js"></script>
  <script src="../src/utils/exportCSV.js"></script>
  <script src="../src/hooks/useLocalStorage.js"></script>
  <script src="../src/components/ErrorBoundary.js"></script>
  <script src="../src/components/ThemeToggle.js"></script>
  <script src="../src/components/DateRangePicker.js"></script>
  <script src="../src/components/StatCard.js"></script>
  <script src="../src/components/LineChart.js"></script>
  <script src="../src/components/BarChart.js"></script>
  <script src="../src/components/PieChart.js"></script>
  <script src="../src/components/AreaChart.js"></script>
  <script src="../src/components/Dashboard.js"></script>
  <script src="../src/App.js"></script>
  <script src="../src/index.js" type="text/babel"></script>
</body>
</html>
